<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2Ray Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .status-bar {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        .container {
            width: 100%;
            max-width: 550px;
            display: grid;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .copy-btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-family: 'Tajawal';
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: #7dd3fc;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .copy-btn:active {
            transform: scale(0.9);
        }

        .config-link {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 11px;
            color: var(--text-dim);
            word-break: break-all;
            direction: ltr;
            text-align: left;
            border: 1px solid #1e293b;
            max-height: 80px;
            overflow-y: auto;
        }

        footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* لضمان عمل الواجهة حتى لو لم تكن هناك سيرفرات بعد */
        .empty-state {
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 2px dashed #334155;
        }
    </style>
</head>
<body>

    <header>
        <h1>V2Ray Pro Dashboard</h1>
        <div class="status-bar">
            <span class="dot"></span>
            تحديث تلقائي من قناة @g33sd
        </div>
    </header>

    <div class="container" id="config-container">
        <div class="empty-state">
            <p>جاري جلب أفضل السيرفرات...</p>
            <small style="color: var(--text-dim)">أعد تحديث الصفحة بعد قليل</small>
        </div>
    </div>

    <footer>
        تم التطوير بنجاح عبر GitHub Actions <br>
        2026 &copy; جميع الحقوق محفوظة
    </footer>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("تم نسخ الإعداد بنجاح! ✅");
            }).catch(() => {
                const shadowInput = document.createElement('textarea');
                shadowInput.value = text;
                document.body.appendChild(shadowInput);
                shadowInput.select();
                document.execCommand('copy');
                document.body.removeChild(shadowInput);
                alert("تم النسخ! ✅");
            });
        }
    </script>
</body>
</html>
